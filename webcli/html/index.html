<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZilMate Swarm Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo-area">
            <div class="logo">ZilMate</div>
        </div>

        <nav class="nav-group">
            <div class="nav-item active" data-tab="chat">
                <span>💬</span> Chat
            </div>
            <div class="nav-item" data-tab="swarm">
                <span>🐝</span> Swarm
            </div>
            <div class="nav-item" data-tab="doctor">
                <span>🩺</span> Channels & Health
            </div>
            <div class="nav-item" data-tab="apps">
                <span>🔌</span> Apps
            </div>
            <div class="nav-item" data-tab="mcp">
                <span>🧩</span> MCP
            </div>
        </nav>

        <div style="padding: 32px; border-top: 1px solid var(--outline-variant);">
            <div style="font-size: 10px; font-weight: 700; color: var(--on-surface-variant); text-transform: uppercase;">v3.5.0 Stable</div>
        </div>
    </aside>

    <main class="main">
        <header>
            <h2 class="page-title">Digital Corporation</h2>
            <div style="display: flex; align-items: center; gap: 12px;">
                <span class="pulsar"></span>
                <span style="font-size: 12px; font-weight: 700; color: var(--success);">System Online</span>
                <div class="avatar" style="background: var(--primary);">JD</div>
            </div>
        </header>

        <!-- Chat View -->
        <div id="view-chat" class="view-container">
            <div class="terminal-wrapper">
                <div id="chat-output" class="terminal-scroll"></div>
                <div class="terminal-input-bar">
                    <input type="text" id="chat-input" class="cli-input" placeholder="Type /doctor or ask anything..." autofocus>
                </div>
            </div>
        </div>

        <!-- Swarm View -->
        <div id="view-swarm" class="view-container hidden">
            <div class="grid" id="swarm-grid"></div>
        </div>

        <!-- Doctor/Channels View -->
        <div id="view-doctor" class="view-container hidden">
            <h3 style="font-size: 14px; font-weight: 700; text-transform: uppercase; color: var(--on-surface-variant);">Multi-Platform Channels</h3>
            <div class="grid" id="doctor-grid"></div>
        </div>

        <!-- Other Views -->
        <div id="view-apps" class="view-container hidden"><div class="card">App Toolkits integration coming soon.</div></div>
        <div id="view-mcp" class="view-container hidden"><div class="card">MCP Servers integration coming soon.</div></div>

    </main>

    <script src="script.js"></script>
</body>
</html>
